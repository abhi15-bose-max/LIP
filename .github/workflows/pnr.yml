name: LIP FPGA Place and Route

on:
  push:

  workflow_dispatch:

jobs:

  pnr:

    runs-on: ubuntu-latest

    steps:

    ###################################################
    # Checkout
    ###################################################

    - name: Checkout Repository

      uses: actions/checkout@v4

    ###################################################
    # Install FPGA tools
    ###################################################

    - name: Install FPGA Tools

      run: |

        sudo apt update

        sudo apt install -y \
          yosys \
          nextpnr-ecp5 \
          zip

    ###################################################
    # Tool versions
    ###################################################

    - name: Show Tool Versions

      run: |

        yosys -V

        nextpnr-ecp5 --version

    ###################################################
    # Show repository
    ###################################################

    - name: Show Repository Structure

      run: |

        find .

    ###################################################
    # FPGA synthesis
    ###################################################

    - name: Generate ECP5 JSON

      run: |

        yosys -p "

          read_verilog \
            rtl/pe/*.v \
            rtl/array/*.v \
            rtl/top/*.v

          hierarchy -check -top lip_array

          synth_ecp5 \
            -top lip_array \
            -json lip_array.json

          stat

        " > fpga_synth_report.txt

    ###################################################
    # nextpnr
    ###################################################

    - name: Run nextpnr

      continue-on-error: true

      run: |

        set +e

        nextpnr-ecp5 \
          --85k \
          --package CABGA381 \
          --speed 6 \
          --json lip_array.json \
          --textcfg lip_array.config \
          2>&1 | tee nextpnr_report.txt

        echo $? > nextpnr_exitcode.txt

    ###################################################
    # Verify output
    ###################################################

    - name: Verify nextpnr Output

      if: always()

      run: |

        echo "===== REPORT SIZE ====="

        ls -lh nextpnr_report.txt

        echo ""

        echo "===== EXIT CODE ====="

        cat nextpnr_exitcode.txt

        echo ""

        echo "===== LAST 80 LINES ====="

        tail -n 80 nextpnr_report.txt

    ###################################################
    # Package everything
    ###################################################

    - name: Package Results

      if: always()

      run: |

        mkdir pnr_results

        cp lip_array.json pnr_results/

        cp fpga_synth_report.txt pnr_results/

        cp nextpnr_report.txt pnr_results/

        cp nextpnr_exitcode.txt pnr_results/

        if [ -f lip_array.config ]; then
          cp lip_array.config pnr_results/
        fi

        zip -r lip-fpga-pnr.zip pnr_results

    ###################################################
    # Upload artifact
    ###################################################

    - name: Upload Artifact

      uses: actions/upload-artifact@v4

      with:

        name: lip-fpga-pnr

        path: lip-fpga-pnr.zip

    ###################################################
    # Console summary
    ###################################################

    - name: Print Summary

      if: always()

      run: |

        echo ""

        echo "===== FPGA SYNTH ====="

        tail -n 40 fpga_synth_report.txt

        echo ""

        echo "===== NEXTPNR ====="

        tail -n 80 nextpnr_report.txt
