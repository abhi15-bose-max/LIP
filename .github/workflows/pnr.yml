name: LIP FPGA Place and Route

on:
  push:
  workflow_dispatch:

jobs:

  pnr:

    runs-on: ubuntu-latest

    steps:

    ###################################################
    # Checkout
    ###################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ###################################################
    # Install tools
    ###################################################

    - name: Install FPGA Tools
      run: |

        sudo apt update

        sudo apt install -y \
          yosys \
          nextpnr-ecp5 \
          zip

    ###################################################
    # Versions
    ###################################################

    - name: Show Tool Versions
      run: |

        yosys -V

        nextpnr-ecp5 --version

    ###################################################
    # Show repo
    ###################################################

    - name: Show Repository Structure
      run: |

        find .

    ###################################################
    # Generate JSON
    ###################################################

    - name: Generate ECP5 JSON

      run: |

        yosys -p "

          read_verilog \
            rtl/pe/*.v \
            rtl/array/*.v \
            rtl/top/*.v

          hierarchy -check -top lip_array

          synth_ecp5 \
            -top lip_array \
            -json lip_array.json

          stat

        " > fpga_synth_report.txt

    ###################################################
    # Run nextpnr
    ###################################################

    - name: Run nextpnr

      continue-on-error: true

      run: |

        nextpnr-ecp5 \
          --85k \
          --package CABGA381 \
          --speed 6 \
          --json lip_array.json \
          --textcfg lip_array.config \
          | tee nextpnr_report.txt

    ###################################################
    # Package outputs
    ###################################################

    - name: Package Results

      run: |

        mkdir pnr_results

        cp lip_array.json pnr_results/

        cp fpga_synth_report.txt pnr_results/

        cp nextpnr_report.txt pnr_results/

        if [ -f lip_array.config ]; then
          cp lip_array.config pnr_results/
        fi

        zip -r lip-fpga-pnr.zip pnr_results

    ###################################################
    # Upload artifact
    ###################################################

    - name: Upload Artifact

      uses: actions/upload-artifact@v4

      with:

        name: lip-fpga-pnr

        path: lip-fpga-pnr.zip

    ###################################################
    # Print report
    ###################################################

    - name: Print nextpnr Report

      if: always()

      run: |

        echo "===== NEXTPNR ====="

        cat nextpnr_report.txt
