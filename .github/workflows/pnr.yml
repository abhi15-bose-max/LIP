name: LIP FPGA Place And Route

on:
  push:
  workflow_dispatch:

jobs:

  pnr:

    runs-on: ubuntu-latest

    steps:

    ####################################################
    # Checkout
    ####################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ####################################################
    # Install FPGA Tools
    ####################################################

    - name: Install FPGA Tools
      run: |

        sudo apt update

        sudo apt install -y \
          yosys \
          nextpnr-ecp5 \
          zip

    ####################################################
    # FPGA Synthesis
    ####################################################

    - name: FPGA Synthesis

      run: |

        yosys -p "

          read_verilog \
            rtl/pe/*.v \
            rtl/array/*.v \
            rtl/top/*.v

          hierarchy -check -top lip_array

          synth_ecp5 \
            -top lip_array \
            -json lip_array.json

        "

    ####################################################
    # Place And Route
    ####################################################

    - name: Run nextpnr

      run: |

        nextpnr-ecp5 \
          --25k \
          --package CABGA381 \
          --json lip_array.json \
          --textcfg lip_array.config \
          --freq 12 \
          2>&1 | tee nextpnr_report.txt

    ####################################################
    # Verify Output
    ####################################################

    - name: Verify Files

      run: |

        ls -lh

        ls -lh nextpnr_report.txt

        wc -l nextpnr_report.txt

    ####################################################
    # Zip Results
    ####################################################

    - name: Package Results

      run: |

        mkdir pnr_results

        cp lip_array.json pnr_results/

        cp lip_array.config pnr_results/

        cp nextpnr_report.txt pnr_results/

        zip -r lip-fpga-pnr.zip pnr_results

    ####################################################
    # Upload Results
    ####################################################

    - name: Upload PnR Results

      uses: actions/upload-artifact@v4

      with:

        name: lip-fpga-pnr

        path: lip-fpga-pnr.zip
